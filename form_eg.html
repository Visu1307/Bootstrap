<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="bootstrap-5.0.2-dist/css/bootstrap.min.css">
    <!-- <script src="bootstrap-5.0.2-dist/js/bootstrap.bundle.js"></script> -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>

<body class="bg-light">
    <h1 class="text-center bg-info p-3 text-white">BS5 Forms</h1>
    <div class="container">
        <form action="#" class="container mt-3">
            <div class="row">
                <h3 class="text-info">Job Application Form</h3>
            </div>
            <!-- <hr class="text-info border border-info border-3"> -->
            <div class="row">
                <div class="col-12 col-sm-6">
                    <div class="my-3 form-floating">
                        <input type="text" id="fnm" class="form-control" placeholder="First Name">
                        <label for="fnm" class="fw-bold">First Name</label>
                    </div>
                </div>
                <div class="col-12 col-sm-6">
                    <div class="my-3 form-floating">
                        <input type="text" id="lnm" class="form-control" placeholder="Last Name">
                        <label for="lnm" class="fw-bold">Last Name</label>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <div class="my-3 form-floating">
                        <input type="text" id="email" class="form-control" placeholder="Email">
                        <label for="email" class="fw-bold">Email</label>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-12 col-sm-12 col-md-6">
                    <div class="my-3">
                        <label for="designation" class="form-label fw-bold">What position you are applying?</label>
                        <select id="designation" class="form-select">
                            <option>Web Designer</option>
                            <option>Full Stack Developer</option>
                            <option>Product Analyst</option>
                            <option>Sales Executive</option>
                        </select>
                    </div>
                </div>
                <div class="col-12 col-sm-6 col-md-3">
                    <div class="my-3">
                        <label for="availDate" class="form-label fw-bold">Available Date</label>
                        <input type="date" id="availDate" class="form-control">
                    </div>
                </div>
                <div class="col-12 col-sm-6 col-md-3">
                    <div class="my-3">
                        <label for="time" class="form-label fw-bold">Available Time</label>
                        <input type="time" id="time" class="form-control">
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-12 col-sm-12 col-md-6">
                    <div class="my-3">
                        <label for="employement" class="form-label fw-bold">What is your current employement
                            status?</label>
                        <br>
                        <div class="row">
                            <div class="col-12 col-sm-6 col-md-3">
                                <div class="form-check-inline">
                                    <input type="radio" name="employement" id="emp" class="form-check-input">
                                    <label for="emp" class="form-check-label">Employed</label>
                                </div>
                            </div>
                            <div class="col-12 col-sm-6 col-md-3">
                                <div class="form-check-inline">
                                    <input type="radio" name="employement" id="semp" class="form-check-input">
                                    <label for="semp" class="form-check-label">Self-Employed</label>
                                </div>
                            </div>
                            <div class="col-12 col-sm-6 col-md-3">
                                <div class="form-check-inline">
                                    <input type="radio" name="employement" id="uemp" class="form-check-input">
                                    <label for="uemp" class="form-check-label">Unemployed</label>
                                </div>
                            </div>
                            <div class="col-12 col-sm-6 col-md-3">
                                <div class="form-check-inline">
                                    <input type="radio" name="employement" id="std" class="form-check-input">
                                    <label for="std" class="form-check-label">Student</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-sm-12 col-md-6 col-lg-6">
                    <div class="my-3">
                        <label for="resume" class="form-label fw-bold">Upload Your Resume</label>
                        <input type="file" id="resume" class="form-control">
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <div class="my-3">
                        <label for="salary" class="form-label fw-bold">Provide Your Salary Expectation</label>
                        <input type="range" id="salary" class="form-range">
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-12 col-sm-6">
                    <div class="my-3 form-floating">
                        <input type="text" id="company" class="form-control" value="RKIT Software Pvt. Ltd." disabled>
                        <label for="company" class="fw-bold">Applying at</label>
                    </div>
                </div>
                <div class="col-12 col-sm-6">
                    <div class="my-3">
                        <label for="company" class="fw-bold form-check-label">Are you flexible</label>
                        <div class="form-check form-switch">
                            <label for="workHours">working in different shifts?</label>
                            <input type="checkbox" id="workHours" class="form-check-input" value="Yes" checked>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <div class="my-3">
                        <button class="btn btn-lg btn-info text-white">Submit</button>
                        <button class="btn btn-lg btn-outline-dark mx-3">Reset</button>
                    </div>
                </div>
            </div>
        </form>
        <hr class="border border-info border-3">
        <div class="row">
            <div class="col text-start">
                <i class="bi bi-arrow-left fs-3 text-primary"></i>
                <a href="form_controls.html" class="text-decoration-none">Form Controls</a>
            </div>
            <div class="col text-center">
                <a href="index.html" class="text-decoration-none"><i class="bi bi-house fs-3 text-primary"></i>Home</a>
            </div>
            <div class="col text-end">
                <a href="components.html" class="text-decoration-none">Components&nbsp;<i
                        class="bi bi-arrow-right fs-3 text-primary"></i></a>
            </div>
        </div>
        <hr class="border border-info border-3">
    </div>
</body>

</html>
