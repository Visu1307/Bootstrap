<script>
  let flag = false
  const topics = document.getElementById("toggleTopics")
  const accBtn = document.getElementsByClassName("accordion-button")
  const accordion = document.getElementsByClassName("accordion-collapse")
  if (topics) {
    topics.addEventListener("click", () => {
      console.log(flag);
      if (!flag) {
        for (let index = 0; index < accBtn.length; index++) {
          if (accBtn[index].classList[1] == "collapsed") {
            accBtn[index].classList.remove("collapsed");
            accordion[index].classList.remove("collapse");
          }
          topics.innerHTML = "Collapse All"
        }
        flag=true
      }
      else {
        for (let index = 0; index < accBtn.length; index++) {
          if (accBtn[index].classList[1] != "collapsed") {
            accBtn[index].classList.add("collapsed");
            accordion[index].classList.add("collapse");
            accordion[index].classList.remove("show");
          }
          topics.innerHTML = "Show All"
        }
        flag=false
      }
    })
  }
</script>
